<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDENTITY</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: #e0e0e0;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 500px;
    }

    p {
      opacity: 0;
      animation: fadeIn 2s forwards;
      margin-top: 20px;
    }

    p:nth-child(2) { animation-delay: 1s; }
    p:nth-child(3) { animation-delay: 3s; }
    p:nth-child(4) { animation-delay: 5s; }

    a {
      display: inline-block;
      margin-top: 40px;
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid currentColor;
      padding-bottom: 4px;
      opacity: 0;
      animation: fadeIn 2s forwards;
      animation-delay: 7s;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>IDENTITY</h1>

    <p>You are shaped by what you carry.</p>
    <p>It accumulates.</p>
    <p>It does not leave unchanged.</p>

    <a href="feed.html?b=identity&s=0&m=early">continue</a>
  </div>
</body>
</html>
