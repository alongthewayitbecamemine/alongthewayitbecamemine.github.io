<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KNOWLEDGE</title>
 <style>
  body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;

    /* Color */
    background: #4A6FA5;
    color: white;

    /* 1 — white frame */
    border: 2px solid white;
    box-sizing: border-box;

    /* 10 — subtle texture */
    background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 20px 20px;
  }

  .container {
    width: 90%;

    /* 8 — tighter app-like width */
    max-width: 320px;
  }

  h1 {
    /* 5 — title spacing */
    letter-spacing: 4px;
    margin-bottom: 20px;
  }

  p {
    opacity: 0;
    animation: fadeIn 2s forwards;
    margin-top: 20px;
  }

  p:nth-child(2) { animation-delay: 1s; }
  p:nth-child(3) { animation-delay: 3s; }
  p:nth-child(4) { animation-delay: 5s; }

  a {
    display: inline-block;
    margin-top: 40px;

    /* 9 — button style */
    border: 1px solid white;
    padding: 10px 20px;
    border-radius: 4px;

    color: white;
    text-decoration: none;

    opacity: 0;
    animation: fadeIn 2s forwards;
    animation-delay: 7s;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }
</style>
</head>

<body>
  <div class="container">
    <h1>KNOWLEDGE</h1>

    <p>You wanted to understand.</p>
    <p>It does not stop once it begins.</p>
    <p>You carry what you learn.</p>

    <a href="feed.html?b=knowledge&s=0&m=early">continue</a>
  </div>
</body>
</html>
