<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BURDEN</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 320px;
    }

    p {
      opacity: 0;
      animation: fadeIn 2s forwards;
      margin: 12px 0;
    }

    p:nth-child(1) { animation-delay: 0.5s; }
    p:nth-child(2) { animation-delay: 2s; }
    p:nth-child(3) { animation-delay: 3.5s; }

    a {
      display: inline-block;
      margin-top: 30px;
      border: 1px solid white;
      padding: 10px 20px;
      text-decoration: none;
      color: white;
      opacity: 0;
      animation: fadeIn 2s forwards;
      animation-delay: 5s;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>

<body>
  <div class="container">
    <p>You have chosen a burden.</p>
    <p>It will stay with you.</p>
    <p>You may continue.</p>

    <a href="knowledge-main.html?s=0">continue</a>
  </div>
</body>
</html>
