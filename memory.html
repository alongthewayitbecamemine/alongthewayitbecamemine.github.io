<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  color: white;
}

#container {
  position: fixed;
  width: 100%;
  height: 100%;
}

img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 2s ease;
}

#text {
  position: absolute;
  bottom: 12%;
  width: 80%;
  left: 10%;
  text-align: center;
  font-size: 18px;
  line-height: 1.4;
  opacity: 0;
  transition: opacity 2s ease;
}

#start {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}

#start button {
  border: 1px solid white;
  background: transparent;
  color: white;
  padding: 12px 24px;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="container">
  <img id="img">
  <div id="text"></div>

  <div id="start">
    <button onclick="start()">begin</button>
  </div>
</div>

<script>

const sequence = [

  { text: "You found something that was not meant for everyone.", img: "", duration: 4000 },

  { text: "This piece is about burdenship, and this is mine.", img: "", duration: 4000 },

  { text: "This past Easter, my Aunt Carolyn passed away.", img: "images/memory1.jpg", duration: 5000 },

  { text: "It was sudden. It was peaceful.", img: null, duration: 4000 },

  { text: "That doesn’t make it hurt any less.", img: null, duration: 4500 },

  { text: "She loved Mardi Gras.", img: "images/memory4.jpg", duration: 5000 },

  { text: "More than anything, she loved her family.", img: "images/memory7.jpg", duration: 6000 },

  { text: "She was my second mother.", img: null, duration: 4500 },

  { text: "The plane ticket was bought. She was supposed to be here.", img: null, duration: 4500 },

  { text: "She was supposed to see this.", img: "images/memory6.jpg", duration: 6000 },

  { text: "It was supposed to be a surprise.", img: null, duration: 4000 },

  { text: "Purple. Green. Gold. Clay beads.", img: null, duration: 4000 },

  { text: "She always wanted me to make New Orleans art.", img: null, duration: 4500 },

  { text: "She would have loved this.", img: null, duration: 5000 },

  { text: "It still hurts to look at it.", img: null, duration: 4500 },

  { text: "Knowing she will never see it.", img: "images/memory5.jpg", duration: 6000 },

  { text: "This piece is for her.", img: null, duration: 5000 },

  { text: "Now you know what I have been carrying.", img: null, duration: 5000 },

  { text: "Thank you for sharing this with me.", img: null, duration: 6000 }

];

let i = 0;

function start() {
  document.getElementById("start").style.display = "none";
  next();
}

function next() {
  if (i >= sequence.length) {
    endFade();
    return;
  }

  const step = sequence[i];
  const img = document.getElementById("img");
  const text = document.getElementById("text");

  text.style.opacity = 0;

  setTimeout(() => {
    // IMAGE LOGIC
    if (step.img === "") {
      img.style.opacity = 0;
    } else if (step.img !== null) {
      img.src = step.img;
      img.style.opacity = 1;
    }
    // if null → keep current image

    text.innerText = step.text;
    text.style.opacity = 1;
  }, 800);

  setTimeout(() => {
    i++;
    next();
  }, step.duration);
}

function endFade() {
  const img = document.getElementById("img");
  const text = document.getElementById("text");

  text.style.opacity = 0;
  img.style.opacity = 0;
}

</script>

</body>
</html>
