<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TIME</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      height: 100vh;
      background: #A53A3A;
      color: white;

      /* subtle texture */
      background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 22px 22px;
    }

    /* inset frame (same system as knowledge) */
    .frame {
      position: fixed;
      inset: 12px;
      border: 2px solid white;
      box-sizing: border-box;

      display: flex;
      justify-content: center;
      align-items: center;

      opacity: 0;
      transform: scale(0.98);
      animation: frameFade 1.2s ease forwards;
    }

    .container {
      width: 90%;
      max-width: 320px;
      text-align: center;
    }

    h1 {
      letter-spacing: 4px;
      margin-bottom: 20px;
    }

    p {
      opacity: 0;
      animation: fadeIn 2s forwards;
      margin-top: 20px;
    }

    p:nth-child(2) { animation-delay: 1s; }
    p:nth-child(3) { animation-delay: 3s; }
    p:nth-child(4) { animation-delay: 5s; }

    a {
      display: inline-block;
      margin-top: 40px;
      border: 1px solid white;
      padding: 10px 20px;
      border-radius: 4px;
      color: white;
      text-decoration: none;

      opacity: 0;
      animation: fadeIn 2s forwards;
      animation-delay: 7s;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes frameFade {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<body>
  <div class="frame">
    <div class="container">

      <h1>TIME</h1>

      <p>It continues without you.</p>
      <p>It continues with you.</p>
      <p>It does not wait.</p>

      <a href="feed.html?b=time&s=0&m=early">continue</a>

    </div>
  </div>
</body>
</html>
